  </g>
  <text x="225" y="650" fill="#1f2937" font-family="Arial, sans-serif" font-size="44" font-weight="800">원룸 홈오피스 존</text>
  <text x="225" y="688" fill="#1f2937" opacity=".75" font-family="Arial, sans-serif" font-size="22">작은 방에서 일과 휴식을 분리하는 공간 구성</text>
