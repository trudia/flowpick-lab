<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="미니멀 책상 셋업">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#dbeafe" offset="0"/>
      <stop stop-color="#ffffff" offset="1"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="1200" height="720" rx="44" fill="url(#g)"/>
  <circle cx="950" cy="140" r="140" fill="#fff" opacity=".55"/>
  <circle cx="160" cy="600" r="170" fill="#fff" opacity=".45"/>
  <g filter="url(#s)">
    <rect x="165" y="160" width="870" height="390" rx="36" fill="#fff" opacity=".92"/>
    <rect x="220" y="230" width="310" height="190" rx="24" fill="#dbeafe" opacity=".9"/>
    <rect x="580" y="240" width="340" height="26" rx="13" fill="#0f172a" opacity=".9"/>
    <rect x="580" y="292" width="260" height="18" rx="9" fill="#0f172a" opacity=".35"/>
    <rect x="580" y="330" width="300" height="18" rx="9" fill="#0f172a" opacity=".22"/>
    <rect x="580" y="390" width="170" height="48" rx="24" fill="#0f172a"/>
  </g>
  <text x="225" y="660" fill="#0f172a" font-family="Arial, sans-serif" font-size="44" font-weight="800">미니멀 책상 셋업</text>
  <text x="225" y="696" fill="#0f172a" opacity=".75" font-family="Arial, sans-serif" font-size="22">책상 위 자극을 줄이고 작업 공간을 단순하게 만드는 셋업</text>
