<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="집중 환경">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#e0f2fe" offset="0"/>
      <stop stop-color="#ffffff" offset="1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0f172a" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1200" height="720" rx="46" fill="url(#g)"/>
  <circle cx="960" cy="130" r="150" fill="#ffffff" opacity=".55"/>
  <circle cx="165" cy="600" r="170" fill="#ffffff" opacity=".5"/>
  <g filter="url(#shadow)">
    <rect x="165" y="155" width="870" height="390" rx="38" fill="#fff" opacity=".94"/>
    <rect x="222" y="226" width="315" height="198" rx="26" fill="#e0f2fe" opacity=".95"/>
    <rect x="586" y="240" width="345" height="28" rx="14" fill="#0c4a6e" opacity=".9"/>
    <rect x="586" y="296" width="265" height="18" rx="9" fill="#0c4a6e" opacity=".36"/>
    <rect x="586" y="334" width="305" height="18" rx="9" fill="#0c4a6e" opacity=".22"/>
    <rect x="586" y="392" width="180" height="50" rx="25" fill="#0c4a6e"/>
  </g>
  <text x="225" y="650" fill="#0c4a6e" font-family="Arial, sans-serif" font-size="44" font-weight="800">집중 환경</text>
  <text x="225" y="688" fill="#0c4a6e" opacity=".75" font-family="Arial, sans-serif" font-size="22">스마트폰과 주변 자극을 줄이는 집중 설계</text>
</svg>