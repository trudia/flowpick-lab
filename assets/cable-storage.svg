      <stop stop-color="#dcfce7" offset="0"/>
      <stop stop-color="#ffffff" offset="1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0f172a" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1200" height="720" rx="46" fill="url(#g)"/>
