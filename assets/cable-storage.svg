    <rect x="586" y="334" width="305" height="18" rx="9" fill="#14532d" opacity=".22"/>
    <rect x="586" y="392" width="180" height="50" rx="25" fill="#14532d"/>
  </g>
  <text x="225" y="650" fill="#14532d" font-family="Arial, sans-serif" font-size="44" font-weight="800">케이블 수납 시스템</text>
  <text x="225" y="688" fill="#14532d" opacity=".75" font-family="Arial, sans-serif" font-size="22">책상 주변 전선과 충전기를 정리하는 수납 흐름</text>
