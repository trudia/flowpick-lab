---
layout: default
title: 검색
description: 트렌드플로우 블로그의 글을 검색합니다.
permalink: /search/
---
<section class="subpage-hero">
  <div class="container narrow">
    <span class="section-label">검색</span>
    <h1>필요한 글을 찾아보세요</h1>
    <p class="page-desc">카테고리명보다 해결하고 싶은 문제를 입력하면 더 잘 찾을 수 있습니다.</p>
    <input id="searchInput" class="search-input" placeholder="예: 블로그 초안, 퇴근 후 집중, 쇼츠 대본, 책상 정리">
  </div>
</section>

<section class="section" style="padding-top:0">
  <div class="container">
    <div id="results" class="blog-grid"></div>
  </div>
</section>

<script>
const POSTS = [
{% for post in site.posts %}
  {
    title: {{ post.title | jsonify }},
    url: {{ post.url | jsonify }},
    category: {{ post.category | jsonify }},
    categoryLabel: {% assign c = site.data.categories | where: "slug", post.category | first %}{{ c.label | jsonify }},
    summary: {{ post.summary | default: post.excerpt | strip_html | strip_newlines | jsonify }},
    image: {{ post.image | default: "" | jsonify }},
    tags: {{ post.tags | jsonify }},
    date: {{ post.date | date: "%Y-%m-%d" | jsonify }}
  }{% unless forloop.last %},{% endunless %}
{% endfor %}
];

const input = document.getElementById('searchInput');
const results = document.getElementById('results');

function card(p){
  const image = p.image
    ? `<img class="post-card-cover" src="${p.image}" alt="${p.title} 대표 이미지" loading="lazy">`
    : `<div class="post-card-cover no-image"><span>${p.categoryLabel || 'TrendFlow'}</span></div>`;
  const tags = Array.isArray(p.tags) ? p.tags.slice(0,2).join(' · ') : '';
  return `<article class="blog-card">
    <a href="${p.url}" class="blog-card-image">${image}</a>
    <div class="blog-card-body">
      <span class="pill">${p.categoryLabel || p.category}</span>
      <h3><a href="${p.url}">${p.title}</a></h3>
      <p>${p.summary}</p>
      <div class="blog-meta"><time>${p.date}</time><span>${tags}</span></div>
    </div>
  </article>`;
}

function render(){
  const q = input.value.trim().toLowerCase();
  const filtered = POSTS.filter(p => !q || [p.title,p.summary,p.category,p.categoryLabel,...(p.tags||[])].join(' ').toLowerCase().includes(q));
  results.innerHTML = filtered.map(card).join('');
}
input.addEventListener('input', render);
render();
</script>
