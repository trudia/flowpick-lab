<a class="nav-cta" href="/editor.html">글쓰기 도구</a></div></header><main><section class="subpage-hero"><div class="container narrow"><span class="section-label">Editor</span><h1>블로그 글쓰기 도구</h1><p class="page-desc">제목, 카테고리, 요약, 대표 이미지 경로, 본문을 입력하면 _posts에 넣을 Markdown 초안을 만들어줍니다. 예: /assets/featured/ai-blog-draft-30min-routine.webp</p></div></section><section class="section" style="padding-top:0"><div class="container editor-grid"><div class="editor-panel"><label>제목<input id="title"></label><label>카테고리<select id="category"><option value="ai-productivity">AI 생산성</option><option value="focus-wellbeing">집중력 & 웰빙</option><option value="minimal-space">공간 & 미니멀</option><option value="trend-shopping">트렌드 쇼핑</option></select></label><label>요약<textarea id="summary"></textarea></label><label>대표 이미지 경로<input id="image" placeholder="/assets/featured/ai-blog-draft-30min-routine.webp"></label><label>본문<textarea id="body" placeholder="## 이 글이 필요한 상황&#10;&#10;내용을 입력하세요"></textarea></label><button class="primary-btn" onclick="generate()">Markdown 생성</button></div><div class="editor-panel"><label>결과<textarea id="output" class="output"></textarea></label><button onclick="copyOutput()">복사하기</button></div></div></section></main><footer class="site-footer"><div class="container footer-inner"><p>© 2026 트렌드플로우. 생활을 가볍게 만드는 기록형 블로그.</p><div><a href="/search">검색</a><a href="/editor.html">글쓰기 도구</a><a href="/privacy.html">개인정보처리방침</a></div></div></footer><script>function today(){return new Date().toISOString().slice(0,10)}function generate(){const title=document.getElementById('title').value.trim();const category=document.getElementById('category').value;const summary=document.getElementById('summary').value.trim();const image=document.getElementById('image').value.trim();const body=document.getElementById('body').value.trim();document.getElementById('output').value=`---\ntitle: "${title}"\ndate: ${today()}\ncategory: ${category}\nsummary: "${summary}"\nimage: "${image}"\ntags: []\n---\n\n${body}\n`}function copyOutput(){const out=document.getElementById('output');out.select();document.execCommand('copy')}</script></body></html>
