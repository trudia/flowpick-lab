---
layout: default
title: 글쓰기 도구
description: Markdown 글 초안을 만드는 보조 도구입니다.
permalink: /editor.html
---
<section class="subpage-hero">
  <div class="container narrow">
    <span class="section-label">Editor</span>
    <h1>블로그 글쓰기 도구</h1>
    <p class="page-desc">제목, 카테고리, 요약, 대표 이미지 경로, 본문을 입력하면 <code>_posts</code>에 넣을 Markdown 초안을 만들어줍니다.</p>
  </div>
</section>
<section class="section" style="padding-top:0">
  <div class="container editor-grid">
    <div class="editor-panel">
      <label>제목<input id="title" placeholder="예: AI로 블로그 글 초안을 30분 안에 만드는 루틴"></label>
      <label>카테고리
        <select id="category">
          {% for c in site.data.categories %}<option value="{{ c.slug }}">{{ c.label }}</option>{% endfor %}
        </select>
      </label>
      <label>요약<textarea id="summary" placeholder="글 요약을 입력하세요"></textarea></label>
      <label>대표 이미지 경로<input id="image" placeholder="/assets/featured/example.webp"></label>
      <label>본문<textarea id="body" placeholder="## 이 글이 필요한 상황&#10;&#10;내용을 입력하세요"></textarea></label>
      <button class="primary-btn" onclick="generate()">Markdown 생성</button>
    </div>
    <div class="editor-panel">
      <label>파일명 추천<input id="filename" readonly></label>
      <label>결과<textarea id="output" class="output"></textarea></label>
      <button onclick="copyOutput()">복사하기</button>
    </div>
  </div>
</section>
<script>
function today(){ return new Date().toISOString().slice(0,10); }
function slugify(s){
  return s.trim().toLowerCase()
    .replace(/[^가-힣a-z0-9]+/g,'-')
    .replace(/^-|-$/g,'');
}
function generate(){
  const title = document.getElementById('title').value.trim();
  const category = document.getElementById('category').value;
  const summary = document.getElementById('summary').value.trim();
  const image = document.getElementById('image').value.trim();
  const body = document.getElementById('body').value.trim();
  const filename = `${today()}-${slugify(title)}.md`;
  document.getElementById('filename').value = `_posts/${filename}`;
  document.getElementById('output').value =
`---
title: "${title}"
date: ${today()}
category: ${category}
summary: "${summary}"
image: "${image}"
tags: []
---

${body}
`;
}
function copyOutput(){
  const out = document.getElementById('output');
  out.select();
  document.execCommand('copy');
}
</script>
