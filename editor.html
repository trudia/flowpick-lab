<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>문제 해결형 글 HTML 생성기 | 트렌드플로우</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="./styles.css?v=41" />
  <style>
    textarea,input,select{width:100%;padding:12px;border:1px solid #dbe3ef;border-radius:12px;font:inherit}
    textarea{min-height:120px}
    .editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .editor-panel{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px}
    @media(max-width:900px){.editor-grid{grid-template-columns:1fr}}
  </style>
</head>
<body data-version="v41-category-images-ui-refresh-2026-05-23">
<header class="site-header">
  <div class="container nav">
    <a class="brand" href="./index.html">
      <span class="brand-icon">T</span>
      <span><strong>트렌드플로우</strong><small>생활 트렌드 큐레이션</small></span>
    </a>
    <nav class="nav-links">
      <a href="./index.html#categories">카테고리</a>
      <a href="./categories/ai-productivity.html">AI 생산성</a>
      <a href="./categories/focus-wellbeing.html">집중력</a>
      <a href="./categories/minimal-space.html">공간/미니멀</a>
      <a href="./categories/trend-shopping.html">트렌드 쇼핑</a>
    </nav>
    <a class="nav-cta" href="./search.html">필요한 글 찾기</a>
  </div>
</header>
<main>
<section class="section">
  <div class="container">
    <span class="section-label">Editor Mode</span>
    <h1>문제 해결형 글 HTML 생성기</h1>
    <p class="lead">내용을 입력하면 <code>posts/새글.html</code>로 올릴 수 있는 HTML을 생성합니다. 저장은 GitHub에서 새 파일로 업로드하세요.</p>
    <div class="editor-grid">
      <div class="editor-panel">
        <h2>글 정보 입력</h2>
        <label>파일명 slug.html</label>
        <input id="slug" value="new-post.html">
        <label>카테고리</label>
        <select id="category">
          <option value="ai-productivity">AI 생산성</option>
          <option value="focus-wellbeing">집중력 & 웰빙</option>
          <option value="minimal-space">공간 & 미니멀</option>
          <option value="trend-shopping">트렌드 쇼핑</option>
        </select>
        <label>제목</label>
        <input id="title" value="새 글 제목">
        <label>요약</label>
        <textarea id="summary">이 글의 요약을 입력하세요.</textarea>
        <label>이미지 경로</label>
        <input id="image" value="../assets/uploads/my-image.webp">
        <label>이런 문제가 있다면</label>
        <textarea id="body1">왜 이 주제가 필요한지 입력하세요.</textarea>
        <label>먼저 이렇게 바꿔보세요</label>
        <textarea id="body2">실사용 관점 리뷰를 입력하세요.</textarea>
        <label>사지 않아도 되는 경우</label>
        <textarea id="dontbuy">사지 않아도 되는 경우를 입력하세요.</textarea>
        <button class="button primary" onclick="generate()">HTML 생성</button>
      </div>
      <div class="editor-panel">
        <h2>생성 결과</h2>
        <p>아래 내용을 복사해서 GitHub에서 <code>posts/파일명</code>으로 새 파일을 만들면 됩니다.</p>
        <textarea id="output" style="min-height:620px"></textarea>
      </div>
    </div>
  </div>
</section>
</main>
<footer class="site-footer">
  <div class="container footer-grid">
    <p>© 2026 트렌드플로우. 생활 트렌드와 실용 조합을 정리합니다.</p>
    <div class="footer-links">
      <a href="./privacy.html" class="privacy-link">개인정보처리방침</a>
      <a href="./terms.html">이용약관</a>
      <a href="./about.html">소개</a>
      <a href="./affiliate.html">제휴 안내</a>
    </div>
  </div>
</footer>
<script>
const cats = {
  "ai-productivity": "AI 생산성",
  "focus-wellbeing": "집중력 & 웰빙",
  "minimal-space": "공간 & 미니멀",
  "trend-shopping": "트렌드 쇼핑"
};
function esc(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}
function generate(){
  const slug=document.getElementById('slug').value.trim() || 'new-post.html';
  const cat=document.getElementById('category').value;
  const catTitle=cats[cat];
  const title=esc(document.getElementById('title').value);
  const summary=esc(document.getElementById('summary').value);
  const image=esc(document.getElementById('image').value);
  const body1=esc(document.getElementById('body1').value);
  const body2=esc(document.getElementById('body2').value);
  const dontbuy=esc(document.getElementById('dontbuy').value);
  const html=`<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>${title} | 트렌드플로우</title>
<meta name="description" content="${summary}" />
<link rel="stylesheet" href="../styles.css?v=41" />
</head>
<body data-version="v41-category-images-ui-refresh-2026-05-23">
<header class="site-header"><div class="container nav"><a class="brand" href="../index.html"><span class="brand-icon">T</span><span><strong>트렌드플로우</strong><small>생활 트렌드 큐레이션</small></span></a><nav class="nav-links"><a href="../index.html#categories">카테고리</a><a href="../categories/ai-productivity.html">AI 생산성</a><a href="../categories/focus-wellbeing.html">집중력</a><a href="../categories/minimal-space.html">공간/미니멀</a><a href="../categories/trend-shopping.html">트렌드 쇼핑</a></nav><a class="nav-cta" href="../search.html">필요한 글 찾기</a></div></header>
<main><section class="subpage-hero"><div class="container"><div class="breadcrumb"><a href="../index.html">홈</a> / <a href="../categories/${cat}.html">${catTitle}</a></div></div></section>
<section class="section" style="padding-top:0"><div class="container post-layout"><article class="post"><span class="section-label">${catTitle}</span><h1>${title}</h1><div class="post-meta"><span>${catTitle}</span><span>읽는 시간 5분</span><span>운영자 작성</span></div><div class="image-wrap thumb-wrap"><img src="${image}" alt="${title} 이미지"><span class="thumb-badge">추천 글</span></div><p>${summary}</p><div class="info-box"><strong>핵심 요약</strong><p>${body1}</p></div><h2>실사용 관점 리뷰</h2><p>${body2}</p><h2>사지 않아도 되는 경우</h2><p>${dontbuy}</p><section class="affiliate-box"><span class="section-label">구매 전에 먼저 확인하세요</span><h2>바로 사기 전에 확인하세요</h2><p>실제 쿠팡파트너스 링크는 검증 후 연결하세요.</p><div class="comparison-grid"><div class="comparison-item"><h3>1순위</h3><p>가장 필요한 항목을 먼저 비교합니다.</p><a class="affiliate-link pending" href="#" rel="nofollow sponsored noopener">추천 상품 준비 중</a></div></div></section><div class="bottom-cta"><h2>다음 단계</h2><p>카테고리에서 관련 글을 더 확인해보세요.</p><a class="button secondary" href="../categories/${cat}.html">카테고리로 돌아가기</a></div></article></div></section></main>
<footer class="site-footer"><div class="container footer-grid"><p>© 2026 트렌드플로우. 생활 트렌드와 실용 조합을 정리합니다.</p><div class="footer-links"><a href="../privacy.html" class="privacy-link">개인정보처리방침</a><a href="../terms.html">이용약관</a><a href="../about.html">소개</a><a href="../affiliate.html">제휴 안내</a></div></div></footer>
</body></html>`;
  document.getElementById('output').value=html;
}
generate();
</script>
</body>
</html>
